  <text x="435" y="293" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">master_wallets.json</text>
  <text x="435" y="307" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">consistency bonus</text>
  <text x="435" y="321" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">re-spot tracking</text>

  <!-- Arrow 6→7 -->
  <line x1="370" y1="295" x2="342" y2="295" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <polygon points="342,290 332,295 342,300" fill="#f59e0b" opacity="0.7"/>

