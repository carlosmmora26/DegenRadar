  <text x="605" y="167" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">per wallet</text>
  <text x="605" y="181" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">48h cache TTL</text>

  <!-- Curved arrow from step 4 down to step 5 -->
  <path d="M 670 155 Q 740 155 740 230 Q 740 280 680 280" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.7" stroke-dasharray="4,3"/>
  <polygon points="680,275 670,280 680,285" fill="#06b6d4" opacity="0.7"/>

