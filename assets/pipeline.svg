<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16162a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="65" x2="900" y2="65"/>
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="325" x2="900" y2="325"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="0" y1="455" x2="900" y2="455"/>
    <line x1="112" y1="0" x2="112" y2="520"/>
    <line x1="225" y1="0" x2="225" y2="520"/>
    <line x1="337" y1="0" x2="337" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="562" y1="0" x2="562" y2="520"/>
    <line x1="675" y1="0" x2="675" y2="520"/>
    <line x1="787" y1="0" x2="787" y2="520"/>
  </g>

  <!-- Title -->
  <text x="450" y="42" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">DegenRadar</text>
  <text x="450" y="62" font-family="'Courier New', monospace" font-size="11" fill="#6b7280" text-anchor="middle">Solana Smart Wallet Discovery Pipeline</text>

  <!-- Accent line under title -->
  <rect x="320" y="70" width="260" height="2" rx="1" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Step boxes: row 1 (steps 1-4) -->
  <!-- Step 1: Discovery -->
  <rect x="30" y="110" width="130" height="90" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="30" y="110" width="130" height="4" rx="2" fill="#7c3aed"/>
  <text x="95" y="135" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed" text-anchor="middle" font-weight="bold">01 / DISCOVERY</text>
  <text x="95" y="153" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">DexScreener</text>
  <text x="95" y="167" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">Pump.fun</text>
  <text x="95" y="181" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">tokens 1d–21d old</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="155" x2="188" y2="155" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <polygon points="188,150 198,155 188,160" fill="#7c3aed" opacity="0.7"/>

  <!-- Step 2: Harvest -->
  <rect x="200" y="110" width="130" height="90" rx="8" fill="url(#cardGrad)" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="200" y="110" width="130" height="4" rx="2" fill="#6366f1"/>
  <text x="265" y="135" font-family="'Courier New', monospace" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="bold">02 / HARVEST</text>
  <text x="265" y="153" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">last 200 txs</text>
  <text x="265" y="167" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">per token</text>
  <text x="265" y="181" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">extract wallets</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="155" x2="358" y2="155" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <polygon points="358,150 368,155 358,160" fill="#6366f1" opacity="0.7"/>

  <!-- Step 3: Filter -->
  <rect x="370" y="110" width="130" height="90" rx="8" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="370" y="110" width="130" height="4" rx="2" fill="#3b82f6"/>
  <text x="435" y="135" font-family="'Courier New', monospace" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="bold">03 / FILTER</text>
  <text x="435" y="153" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">drop whales</text>
  <text x="435" y="167" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">drop MEV bots</text>
  <text x="435" y="181" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">drop insiders</text>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="155" x2="528" y2="155" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <polygon points="528,150 538,155 528,160" fill="#3b82f6" opacity="0.7"/>

  <!-- Step 4: Enrich -->
  <rect x="540" y="110" width="130" height="90" rx="8" fill="url(#cardGrad)" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="540" y="110" width="130" height="4" rx="2" fill="#06b6d4"/>
  <text x="605" y="135" font-family="'Courier New', monospace" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="bold">04 / ENRICH</text>
