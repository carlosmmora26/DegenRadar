  <text x="265" y="293" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">top 30 wallets</text>
  <text x="265" y="307" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">poll every 2 min</text>
  <text x="265" y="321" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">push alerts</text>

