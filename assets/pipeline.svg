  <text x="95" y="283" font-family="'Courier New', monospace" font-size="9" fill="#ef4444" text-anchor="middle">🚨 ALERT</text>
  <text x="95" y="299" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af" text-anchor="middle">wallet_Ax3f... bought</text>
  <text x="95" y="313" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af" text-anchor="middle">BONK · 2.4 SOL</text>
  <text x="95" y="327" font-family="'Courier New', monospace" font-size="8" fill="#6b7280" text-anchor="middle">score: 78 · WR: 71%</text>
  <line x1="200" y1="295" x2="162" y2="295" stroke="#ef4444" stroke-width="1.5" opacity="0.7" stroke-dasharray="4,3"/>
  <polygon points="162,290 152,295 162,300" fill="#ef4444" opacity="0.7"/>

  <!-- Scoring breakdown box -->
  <rect x="710" y="110" width="162" height="230" rx="8" fill="#0d0d1a" stroke="#374151" stroke-width="1"/>
  <text x="791" y="133" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">ALPHA SCORE</text>
  <text x="791" y="150" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle" filter="url(#glow)">78.4</text>

  <!-- Score bars -->
  <text x="722" y="175" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af">PnL</text>
  <rect x="745" y="165" width="80" height="8" rx="2" fill="#1e1e3a"/>
  <rect x="745" y="165" width="58" height="8" rx="2" fill="#7c3aed" opacity="0.8"/>
  <text x="858" y="173" font-family="'Courier New', monospace" font-size="8" fill="#7c3aed">35%</text>

  <text x="722" y="195" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af">WR</text>
  <rect x="745" y="185" width="80" height="8" rx="2" fill="#1e1e3a"/>
  <rect x="745" y="185" width="50" height="8" rx="2" fill="#3b82f6" opacity="0.8"/>
  <text x="858" y="193" font-family="'Courier New', monospace" font-size="8" fill="#3b82f6">25%</text>

  <text x="722" y="215" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af">Copy</text>
  <rect x="745" y="205" width="80" height="8" rx="2" fill="#1e1e3a"/>
  <rect x="745" y="205" width="50" height="8" rx="2" fill="#06b6d4" opacity="0.8"/>
  <text x="858" y="213" font-family="'Courier New', monospace" font-size="8" fill="#06b6d4">25%</text>

  <text x="722" y="235" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af">Cons</text>
  <rect x="745" y="225" width="80" height="8" rx="2" fill="#1e1e3a"/>
  <rect x="745" y="225" width="30" height="8" rx="2" fill="#10b981" opacity="0.8"/>
  <text x="858" y="233" font-family="'Courier New', monospace" font-size="8" fill="#10b981">15%</text>

  <line x1="722" y1="248" x2="860" y2="248" stroke="#374151" stroke-width="1"/>

  <text x="722" y="265" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">trades</text>
  <text x="860" y="265" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af" text-anchor="end">47</text>
  <text x="722" y="280" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">win rate</text>
  <text x="860" y="280" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af" text-anchor="end">68%</text>
  <text x="722" y="295" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">avg hold</text>
  <text x="860" y="295" font-family="'Courier New', monospace" font-size="8" fill="#9ca3af" text-anchor="end">8.3m</text>
  <text x="722" y="310" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">pnl</text>
  <text x="860" y="310" font-family="'Courier New', monospace" font-size="8" fill="#10b981" text-anchor="end">+12.4 SOL</text>
  <text x="722" y="325" font-family="'Courier New', monospace" font-size="8" fill="#6b7280">copyable</text>
  <text x="860" y="325" font-family="'Courier New', monospace" font-size="8" fill="#10b981" text-anchor="end">✓ yes</text>

  <!-- Scheduler info -->
  <rect x="30" y="390" width="840" height="50" rx="8" fill="#0d0d1a" stroke="#374151" stroke-width="1"/>
  <text x="450" y="411" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">SCHEDULER</text>
  <text x="450" y="430" font-family="'Courier New', monospace" font-size="9" fill="#9ca3af" text-anchor="middle">Full pipeline runs every 2–4 hours (adaptive)  ·  Watcher polls top 30 wallets every 2 min  ·  10,000+ wallets tracked in master list</text>

  <!-- Footer -->
  <text x="450" y="500" font-family="'Courier New', monospace" font-size="8" fill="#374151" text-anchor="middle">github.com/your-username/DegenRadar  ·  python 3.11+  ·  solana mainnet</text>
</svg>
